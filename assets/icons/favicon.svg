<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e8c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Decorative cherry blossom dots -->
  <circle cx="6" cy="6" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="26" cy="6" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="6" cy="26" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="26" cy="26" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Initials MT -->
  <text x="16" y="21"
    font-family="Georgia, serif"
    font-size="13"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="0.5">MT</text>
  <!-- Bottom accent line -->
  <rect x="10" y="24" width="12" height="1.5" rx="1" fill="rgba(255,255,255,0.5)"/>
</svg>
